  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f5f5f0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s ease;
    }
    #app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .app-loading-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-loading-spinner {
      position: absolute;
      inset: 0;
      width: 80px;
      height: 80px;
      border: 3px solid #e5e7eb;
      border-top-color: #16a34a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .app-loading-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    <!-- Critical inline CSS: paints the brand background and reserves the
         hero/banner boxes BEFORE the JS bundle parses, so the user sees
         something immediately and there is no layout shift when React mounts. -->
    <style>
      html,body{margin:0;background:#f6f0e6;color:#111;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      .pc-boot{display:flex;flex-direction:column;min-height:100vh}
      .pc-boot__banner{height:36px;background:#16a34a}
      .pc-boot__header{height:64px;background:#fff;border-bottom:1px solid #e5e7eb}
      @media (min-width:768px){.pc-boot__header{height:80px}}
    </style>

    <!-- LCP preload bootstrap. On repeat visits we know the hero slide URL
         from the previous visit (cached in localStorage by Home.tsx). Inject a
         <link rel="preload"> for it BEFORE the JS bundle parses so the LCP
         image downloads in parallel with the bundle instead of waiting on
         React mount + Firestore round trip. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('pakcart_hero_v1');
          if (!raw) return;
          var data = JSON.parse(raw);
          if (!data) return;
          var isMobile = window.matchMedia('(max-width: 767px)').matches;
          var url = isMobile ? data.mobile : data.desktop;
          if (!url || typeof url !== 'string') return;
          var link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = url;
          link.fetchPriority = 'high';
          document.head.appendChild(link);
        } catch (e) {}
      })();
    </script>

    <div id="root">
      <!-- Lightweight pre-hydration skeleton. React replaces this entire tree
           on first render. Mirrors the real layout so LCP/CLS aren't penalised
           by the SPA boot. -->

        <div class="pc-boot__banner"></div>
        <div class="pc-boot__header"></div>

    <script type="module" src="/src/main.tsx"></script>
    <!-- Speculation Rules: Chrome / Edge will silently prerender these routes
         on hover/intent so in-site navigation feels instant. Ignored by Safari
         and older browsers (no impact). "moderate" eagerness = on hover. -->
    <script type="speculationrules">
      {
        "prerender": [
          {
            "where": {
              "or": [
                { "href_matches": "/collections/*" },
                { "href_matches": "/products/*" },
                { "href_matches": "/categories" },
                { "href_matches": "/new-arrivals" }
              ]
            },
            "eagerness": "moderate"
          }
        ]
      }
    </script>
